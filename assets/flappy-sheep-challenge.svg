      <stop offset="1" stop-color="#ffba3a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#42dc85"/>
      <stop offset="1" stop-color="#176c42"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
