<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Flappy Sheep challenge image</title>
  <desc id="desc">A promotional challenge image for Flappy Sheep encouraging players to climb the leaderboard.</desc>
  <defs>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.52" stop-color="#1e3351"/>
      <stop offset="1" stop-color="#0f1726"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
